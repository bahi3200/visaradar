name: Security Scan (RLS & Realtime)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  rls-realtime-scan:
    name: Block PR on new RLS / Realtime findings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Run Supabase database linter
        id: lint
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_REF secret"
            exit 1
          fi
          mkdir -p .security
          supabase db lint --linked --project-ref "$SUPABASE_PROJECT_REF" --output json > .security/lint.json 2>.security/lint.err || true
          cat .security/lint.json

      - name: Inspect RLS / Realtime guarantees in migrations
        id: rls-check
        run: |
          set -e
          FAIL=0
          REPORT=.security/report.md
          mkdir -p .security
          echo "# Security scan report" > "$REPORT"
          echo "" >> "$REPORT"

          # 1. Diff migrations against base ref to focus on new SQL only
          BASE_REF="${{ github.event.pull_request.base.sha || 'HEAD~1' }}"
          NEW_SQL=$(git diff --name-only "$BASE_REF"...HEAD -- 'supabase/migrations/*.sql' || true)
          echo "Changed migrations:"
          echo "$NEW_SQL"

          if [ -n "$NEW_SQL" ]; then
            # 2. Any new table created without RLS enabled => block
            for f in $NEW_SQL; do
              [ -f "$f" ] || continue
              # Find tables created in public schema
              TABLES=$(grep -iEo 'create[[:space:]]+table[[:space:]]+(if[[:space:]]+not[[:space:]]+exists[[:space:]]+)?public\.[a-z0-9_]+' "$f" | awk '{print $NF}' | sort -u || true)
              for t in $TABLES; do
                if ! grep -qiE "alter[[:space:]]+table[[:space:]]+${t}[[:space:]]+enable[[:space:]]+row[[:space:]]+level[[:space:]]+security" "$f"; then
                  echo "- ❌ Table \`$t\` created in \`$f\` without ENABLE ROW LEVEL SECURITY" >> "$REPORT"
                  FAIL=1
                fi
              done

              # 3. Block overly permissive policies (USING true / WITH CHECK true) unless explicitly tagged public
              if grep -qiE "(using[[:space:]]*\([[:space:]]*true[[:space:]]*\))|(with[[:space:]]+check[[:space:]]*\([[:space:]]*true[[:space:]]*\))" "$f"; then
                if ! grep -qiE '--[[:space:]]*security:[[:space:]]*public-ok' "$f"; then
                  echo "- ❌ Permissive policy (\`USING true\`/\`WITH CHECK true\`) in \`$f\` without \`-- security: public-ok\` marker" >> "$REPORT"
                  FAIL=1
                fi
              fi

              # 4. Block realtime publication additions that are not audited
              if grep -qiE "alter[[:space:]]+publication[[:space:]]+supabase_realtime[[:space:]]+add[[:space:]]+table" "$f"; then
                if ! grep -qiE '--[[:space:]]*realtime:[[:space:]]*reviewed' "$f"; then
                  echo "- ❌ Realtime publication change in \`$f\` without \`-- realtime: reviewed\` marker" >> "$REPORT"
                  FAIL=1
                fi
              fi

              # 5. Block direct writes to realtime/auth/storage reserved schemas
              if grep -qiE "(alter|create|drop)[[:space:]]+(table|policy|trigger|function)[[:space:]]+(if[[:space:]]+(not[[:space:]]+)?exists[[:space:]]+)?(auth|storage|realtime|supabase_functions|vault)\." "$f"; then
                # Realtime policies on realtime.messages are allowed only via has_role pattern
                if grep -qiE 'realtime\.messages' "$f" && grep -qiE 'has_role\(auth\.uid\(\)' "$f"; then
                  echo "- ⚠️ Realtime policy change in \`$f\` (allowed: uses has_role guard)" >> "$REPORT"
                else
                  echo "- ❌ Reserved schema modification in \`$f\` without approved pattern" >> "$REPORT"
                  FAIL=1
                fi
              fi
            done
          else
            echo "_No migration changes in this PR._" >> "$REPORT"
          fi

          # 6. Parse supabase linter output for RLS-related findings
          if [ -s .security/lint.json ]; then
            node -e "
              const fs=require('fs');
              let data=[];
              try { data=JSON.parse(fs.readFileSync('.security/lint.json','utf8')); } catch(e){ process.exit(0); }
              const blocking=data.filter(x=>{
                const n=(x.name||'').toLowerCase();
                const d=(x.description||'').toLowerCase();
                return n.includes('rls')||n.includes('policy')||n.includes('realtime')||d.includes('row level security')||d.includes('realtime');
              });
              if(blocking.length){
                fs.appendFileSync('.security/report.md','\n## Linter findings (RLS/Realtime)\n');
                for(const b of blocking){
                  fs.appendFileSync('.security/report.md',\`- ❌ [\${b.level||'warn'}] \${b.name}: \${b.description}\n\`);
                }
                process.exit(2);
              }
            " || FAIL=1
          fi

          cat "$REPORT"
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Security scan blocked the merge (RLS / Realtime findings)."
            exit 1
          fi

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: .security/

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '✅ No new RLS / Realtime security findings.';
            try {
              const r = fs.readFileSync('.security/report.md','utf8');
              if (r.includes('❌')) body = r;
              else if (r.trim()) body = r;
            } catch(e) {}
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  required-status:
    name: Security gate
    needs: rls-realtime-scan
    runs-on: ubuntu-latest
    steps:
      - run: echo "Security gate passed."